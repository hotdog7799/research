<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hyojun Research Notes</title>
  <meta name="description" content="Research notes and protected project reports.">
  <link rel="stylesheet" href="styles/site.css">
  <script src="scripts/site.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="kicker">Hyojun Research</p>
      <h1>Research Notes</h1>
      <p class="intro">A compact archive for calibration notes, experiments, and protected project reports.</p>
    </div>
  </header>

  <main>
    <section class="section-header" aria-labelledby="active-projects">
      <div>
        <p class="eyebrow">Archive</p>
        <h2 id="active-projects">Project Reports</h2>
      </div>
    </section>

    <section class="report-grid" id="report-grid" aria-label="Project report list">
      <p class="empty-state" id="report-status">Loading project reports.</p>
    </section>
  </main>

  <footer>
    <span>Hyojun Research Notes</span>
  </footer>
</body>
</html>
